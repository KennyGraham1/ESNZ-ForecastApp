site_name: ESNZ-ForecastApp
site_description: New Zealand earthquake analysis and aftershock forecasting application
site_author: ESNZ-ForecastApp Contributors
repo_url: https://github.com/KennyGraham1/ESNZ-ForecastApp
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture Overview: architecture.md
  - Data Flow & Logic: data-flow.md
  - Clustering Algorithms: clustering-algorithms.md
  - Statistical Models: statistical-models.md
  - Performance Optimizations: performance.md
  - Setup & Deployment: setup.md
  - Reference:
    - Clustering Algorithm Notes: reference/CLUSTERING_ALGORITHMS.md
    - Omori Law Analysis: reference/OMORI_LAW_ANALYSIS.md
    - Confidence Intervals: reference/CONFIDENCE_INTERVALS_IMPROVED.md
    - Performance Optimizations (Legacy): reference/PERFORMANCE_OPTIMIZATIONS.md
    - Additional Optimizations: reference/ADDITIONAL_OPTIMIZATIONS.md
    - Parallel Fetch Optimization: reference/PARALLEL_FETCH_OPTIMIZATION.md
